# 桌面应用自动打包:push tag v* 时触发,在 Windows 上 build 并上传 .msi/.exe 到 Release。
# 详见 skill-tree/desktop/README.md。
#
# 当前仅 Windows(macOS 需 macos-latest runner + 本地验证后再开,见 desktop/README.md 第六章)。
# lark-cli 从公开 npm @larksuite/cli 装入(CI 环境无预装)。
name: Build Desktop Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:       # 允许手动触发(调试用)

permissions:
  contents: write           # 上传 release assets 需要

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # 用稳定版,不用 3.14(dev 用的 3.14 太新)

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            skill-tree/desktop/src-tauri/target
            ~/.cargo/registry
          key: cargo-windows-${{ hashFiles('skill-tree/desktop/src-tauri/Cargo.lock') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install lark-cli (for Feishu doc feature)
        run: npm install -g @larksuite/cli

      - name: Build frontend
        working-directory: skill-tree/frontend
        run: |
          npm ci
          npm run build

      - name: Build backend (PyInstaller)
        working-directory: skill-tree/backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller skill-tree-backend.spec --noconfirm

      - name: Stage sidecar + lark-cli + icons
        working-directory: skill-tree/desktop/src-tauri
        run: |
          rm -rf sidecar
          mkdir -p sidecar
          Copy-Item -Path ../../backend/dist/skill-tree-backend/* -Destination sidecar/ -Recurse
          mkdir -p resources
          $lark = (Get-Command lark-cli).Source
          Copy-Item $lark resources/lark-cli.exe
        shell: pwsh

      - name: Build Tauri installer
        working-directory: skill-tree/desktop/src-tauri
        run: cargo tauri build

      - name: Upload msi asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            skill-tree/desktop/src-tauri/target/release/bundle/msi/*.msi
            skill-tree/desktop/src-tauri/target/release/bundle/nsis/*.exe
