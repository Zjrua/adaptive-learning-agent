name: CI

on:
  push:
    paths:
      - "deepctr_torch/**"
      - "tests/**"
      - "examples/**"
      - "setup.py"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "deepctr_torch/**"
      - "tests/**"
      - "examples/**"
      - "setup.py"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          # Python 3.7 cannot install torch 2.4/2.5 wheels from official index.
          # Keep a legacy torch smoke job to guarantee 3.7 runtime compatibility.
          - python-version: "3.7"
            torch-version: "1.13.1"
          - python-version: "3.8"
            torch-version: "2.4.1"
          - python-version: "3.9"
            torch-version: "2.4.1"
          - python-version: "3.9"
            torch-version: "2.5.1"
          - python-version: "3.10"
            torch-version: "2.4.1"
          - python-version: "3.10"
            torch-version: "2.5.1"
            run-examples: "1"
          - python-version: "3.11"
            torch-version: "2.4.1"
          - python-version: "3.11"
            torch-version: "2.5.1"
          - python-version: "3.12"
            torch-version: "2.4.1"
          - python-version: "3.12"
            torch-version: "2.5.1"

    env:
      TORCH_VERSION: ${{ matrix.torch-version }}
      TORCH_INDEX_URL: https://download.pytorch.org/whl/cpu
      RUN_EXAMPLES: ${{ matrix.run-examples || '0' }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup python environment
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: bash tests/ci/install.sh

      - name: Test with pytest
        timeout-minutes: 180
        run: bash tests/ci/test.sh

      - name: Run examples smoke tests
        if: ${{ env.RUN_EXAMPLES == '1' }}
        timeout-minutes: 60
        run: bash tests/ci/examples.sh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: pytest
          name: py${{ matrix.python-version }}-torch${{ matrix.torch-version }}
